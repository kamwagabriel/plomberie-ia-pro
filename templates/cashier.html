<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IA SIMULATEUR</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; padding: 20px; text-align: center; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; max-width: 400px; margin: 20px auto; }
        .btn { background: #1e293b; border: 2px solid #334155; color: white; padding: 20px; border-radius: 12px; cursor: pointer; font-weight: bold; }
        .btn.active { border-color: #3b82f6; background: #1e3a8a; }
        .btn-send { background: #ef4444; color: white; width: 100%; max-width: 400px; border: none; padding: 20px; border-radius: 12px; font-weight: bold; font-size: 18px; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>
    <h2 style="color:#3b82f6;">🤖 SIMULATEUR APPEL IA</h2>
    <div class="grid">
        <button class="btn pz" onclick="setP('Fuite d\'eau 💧', 90)">Fuite d'eau</button>
        <button class="btn pz" onclick="setP('Débouchage 🚽', 130)">Débouchage</button>
        <button class="btn pz" onclick="setP('Chauffe-eau 🌡️', 250)">Chauffe-eau</button>
        <button class="btn pz" onclick="setP('Réparation 🔧', 75)">Autre</button>
    </div>
    <button class="btn-send" onclick="valider()">TRANSMETTRE AU PLOMBIER ➔</button>

<script>
    const socket = io();
    let piz='', baseP=0;
    function setP(n,p){ piz=n; baseP=p; document.querySelectorAll('.pz').forEach(b => { b.classList.remove('active'); if(b.innerText.includes(n.split(' ')[0])) b.classList.add('active'); }); }
    function valider(){
        if(!piz) return alert("Sélectionnez une panne");
        socket.emit('new_order', { id: Date.now(), type: "DÉPANNAGE", nom: "M. Martin", tel: "0612345678", pizza: piz, total: baseP.toFixed(2), adresse: "14 Rue des Lilas, Paris" });
        alert("Envoyé !");
    }
</script>
</body>
</html>
